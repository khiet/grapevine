name: ci

on:
  pull_request:
  push:
    branches: [main]

# Supersede in-progress runs for the same branch/PR; only the latest push matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS, not ubuntu: the Rust suite links against the macOS-only tray and
    # Keychain code, so it cannot compile on another platform.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Typechecks and populates ../dist, which src-tauri/build.rs expects to
      # exist before the Rust crate will compile.
      - name: Typecheck and build the frontend
        run: npm run build

      - name: Frontend tests
        run: npm test

      - name: Rust tests
        run: npm run test:rust
